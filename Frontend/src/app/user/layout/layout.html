<div class="dashboard-shell">

  <!-- ── LEFT SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="5" width="28" height="20" rx="5" fill="url(#logoG)"/>
          <path d="M3 21l7 8v-8" fill="url(#logoG)"/>
          <text x="9" y="20" font-family="monospace" font-size="11" font-weight="bold" fill="#0a0a0a">&lt;/&gt;</text>
          <defs>
            <linearGradient id="logoG" x1="0" y1="0" x2="36" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ffd35c"/><stop offset="1" stop-color="#fc657e"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">IntervAI</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/user/dashboard" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/user/interviews" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          <path d="M8 10h8M8 14h5"/>
        </svg>
        <span>Interviews</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item logout-btn" (click)="showLogoutDialog = true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </aside>
  <!-- ── LOGOUT CONFIRMATION DIALOG ── -->
  <div class="logout-backdrop" *ngIf="showLogoutDialog" (click)="showLogoutDialog = false">
    <div class="logout-dialog" (click)="$event.stopPropagation()">
      <div class="logout-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
      <h3 class="logout-title">Sign out?</h3>
      <p class="logout-body">You'll need to sign back in to access your interviews and results.</p>
      <div class="logout-actions">
        <button class="logout-btn-cancel" (click)="showLogoutDialog = false">Stay</button>
        <button class="logout-btn-confirm" (click)="onLogout()">Yes, sign out</button>
      </div>
    </div>
  </div>
  <!-- ── MAIN CONTENT ── -->
  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">{{ pageTitle }}</h1>
        <span class="page-subtitle">{{ pageSubtitle }}</span>
      </div>
      <div class="topbar-right">
        <button class="cta-btn" routerLink="/user/interview/setup">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start Interview
        </button>
        <div class="user-info">
          <div class="user-avatar">{{ userInitial }}</div>
          <div class="user-details">
            <span class="user-name">{{ userInfo?.username }}</span>
            <span class="user-email">{{ userInfo?.email }}</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ── PAGE CONTENT injected here ── -->
    <router-outlet/>

  </div>
</div>
